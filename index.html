function saveWeeklyData(){
  try{ window.storage.set('weeklyData', JSON.stringify(weeklyData)); }catch(e){}

function loadWeeklyData(cb){
  try{
    window.storage.get('weeklyData').then(function(r){
      if(r && r.value){
        var parsed = JSON.parse(r.value);
        Object.keys(parsed).forEach(function(m){
          parsed[m] = parsed[m].map(function(w){
            return {month:w.month,label:w.label,starts:w.starts?new Date(w.starts):null,ends:w.ends?new Date(w.ends):null,

              purchases:w.purchases||0,revenue:w.revenue||0,roas:w.roas||0};
          });
        });
        weeklyData = parsed;
      }
      cb();
    }).catch(function(){ cb(); });
  }catch(e){ cb(); }
}

function mergePreloadedWeeks(){
  var all = JAN_WEEKS.concat(FEB_WEEKS);
  for(var i=0;i<all.length;i++){
    var w = all[i];
    if(!weeklyData[w.month]) weeklyData[w.month] = [];
    var found = false;
    for(var j=0;j<weeklyData[w.month].length;j++){
      if(weeklyData[w.month][j].label === w.label){ found=true; break; }
    }
    if(!found) weeklyData[w.month].push(w);
  }
  Object.keys(weeklyData).forEach(function(m){
    weeklyData[m].sort(function(a,b){ return new Date(a.starts)-new Date(b.starts); });
  });
}

function parseCSVCamp(text){
  var delim = text.indexOf('\t') > -1 ? '\t' : ',';
  var lines = text.trim().split('\n');
  var headers = lines[0].split(delim).map(function(h){ return h.trim(); });
  var rows = [];
  for(var i=1;i<lines.length;i++){
    var vals = lines[i].split(delim);
    var obj = {};
    for(var j=0;j<headers.length;j++) obj[headers[j]] = (vals[j]||'').trim();
    rows.push(obj);
  }
  return rows;
}

function gv(r){
  var keys = Array.prototype.slice.call(arguments, 1);
  for(var k=0;k<keys.length;k++){
    var key = keys[k];
    if(r[key] !== undefined && r[key] !== '') return r[key];
    for(var rk in r){
      if(rk.toLowerCase() === key.toLowerCase() && r[rk] !== '') return r[rk];
    }
  }
  return '';
}

function mapRow(r){
  return {
    month:     r['MONTH']      || r['Month']      || r['month']      || '',
    platform:  r['PLATFORM']   || r['Platform']   || r['platform']   || '',
    objective: r['Objective']  || r['OBJECTIVE']  || r['objective']  || '',
    campaign:  r['CAMPAIGN']   || r['Campaign']   || r['campaign']   || '',
    impressions: parseFloat(r['Impressions'] || r['IMPRESSIONS'] || 0),
    reach:       parseFloat(r['Reach']       || r['REACH']       || 0),
    messages:    parseFloat(r['Messages']    || r['MESSAGES']    || 0),
    clicks:      parseFloat(r['Clicks']      || r['CLICKS']      || 0),
    cpc:         parseFloat(r['Cost Per Click'] || r['CPC']      || 0),
    spend:       parseFloat(r['SPEND USD']   || r['Spend']       || r['spend'] || 0),
    purchases:   parseFloat(r['Purchases']   || r['PURCHASES']   || 0),
    leads:       parseFloat(r['Leads']       || r['LEADS']       || 0),
    revenue:     parseFloat(r['REVENUE']     || r['Revenue']     || 0),
    roas:        parseFloat(r['ROAS']        || r['roas']        || 0)
  };
}

function mergeCampaigns(rows){
  var mapped = rows.map(mapRow).filter(function(r){ return r.spend>0||r.impressions>0; });
  if(mapped.length){
    allCampaigns = CAMPAIGNS.slice();
    for(var i=0;i<mapped.length;i++) allCampaigns.push(mapped[i]);
  }
}

function fetchSheetData(cb){
  var status = document.getElementById('fetchStatus');
  status.textContent = 'Fetching...';
  fetch(SHEET_URL, {redirect: 'follow'})
    .then(function(r){ return r.json(); })
    .then(function(rows){
      if(rows && rows.length){
        var mapped = rows.map(mapRow).filter(function(r){ return r.spend>0||r.impressions>0; });
        if(mapped.length){
          allCampaigns = CAMPAIGNS.slice();
          for(var i=0;i<mapped.length;i++) allCampaigns.push(mapped[i]);
        }
        status.textContent = 'Updated ' + new Date().toLocaleTimeString();
      } else {
        status.textContent = 'No data in sheet';
      }
      if(cb) cb();
    })
    .catch(function(){
      status.textContent = 'Using local data';
      if(cb) cb();
    });
}

function updateWeekFilter(){
  var m = document.getElementById('monthFilter').value;
  var sel = document.getElementById('weekFilter');
  var grp = document.getElementById('weekFilterGroup');
  sel.innerHTML = '<option value="all">All Weeks</option>';
  if(m === 'all' || !weeklyData[m] || !weeklyData[m].length){ grp.style.display='none'; return; }
  grp.style.display = '';
  for(var i=0;i<weeklyData[m].length;i++){
    var o = document.createElement('option');
    o.value = weeklyData[m][i].label;
    o.textContent = weeklyData[m][i].label;
    sel.appendChild(o);
  }
}

function getFilters(){
  return {
    month: document.getElementById('monthFilter').value,
    platform: document.getElementById('platformFilter').value,
    week: document.getElementById('weekFilter').value
  };
}

function filteredCampaigns(){
  var f = getFilters();
  return allCampaigns.filter(function(d){
    return (f.month==='all'||d.month===f.month) && (f.platform==='all'||d.platform===f.platform);
  });
}

function activeWeekData(){
  var f = getFilters();
  if(f.week==='all') return null;
  if(f.month==='all'||!weeklyData[f.month]) return null;
  for(var i=0;i<weeklyData[f.month].length;i++){
    if(weeklyData[f.month][i].label===f.week) return weeklyData[f.month][i];
  }
  return null;
}

function setLatestMonth(){
  var order = ['Jan_26','Feb_26','Mar_26','Apr_26','May_26','Jun_26','Jul_26','Aug_26','Sep_26','Oct_26','Nov_26','Dec_26'];
  var latest = '';
  for(var i=0;i<order.length;i++){
    var m = order[i];
    for(var j=0;j<allCampaigns.length;j++){
      if(allCampaigns[j].month===m){ latest=m; break; }
    }
  }
  if(latest) document.getElementById('monthFilter').value = latest;
}

function sum(arr,key){
  var s=0; for(var i=0;i<arr.length;i++) s+=(arr[i][key]||0); return s;
}
function fmtK(v){ var n=parseFloat(v); if(isNaN(n)) return '\u2014'; return n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':n.toLocaleString(); }
function fmtD(n,dec){ if(dec===undefined) dec=2; return isNaN(n)||!isFinite(n)?'\u2014':'$'+n.toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }

function renderDashboard(){
  var campaigns = filteredCampaigns();
  var weekRow = activeWeekData();
  var isWeekly = !!weekRow;
  renderKPIs(campaigns, weekRow);
  document.getElementById('breakdownSection').style.display = isWeekly ? 'none' : 'block';
  if(!isWeekly){
    renderMeta(campaigns.filter(function(d){ return d.platform==='META'; }));
    renderGoogle(campaigns.filter(function(d){ return d.platform==='Google'||d.platform==='GOOGLE'; }));
  }
  var m = getFilters().month;
  var labels = {all:'All Months',Jan_26:'January 2026',Feb_26:'February 2026',Mar_26:'March 2026'};
  document.getElementById('reportPeriod').textContent = labels[m] || m;
}

function renderKPIs(campaigns, weekRow){
  var note = document.getElementById('weekNote');
  var grid = document.getElementById('kpiGrid');

  if(weekRow){
    note.style.display = '';
    note.innerHTML = 'Showing weekly data for <span>' + weekRow.label + '</span>';

    var metaCamps = filteredCampaigns().filter(function(d){ return d.platform==='META'; });
    var metaClicks = sum(metaCamps,'clicks');
    var metaCpc = metaClicks ? weekRow.spend/metaClicks : 0;
    var metaCtr = weekRow.impressions ? (metaClicks/weekRow.impressions*100) : 0;

    var metaKpis = [
      {l:'Spend',v:fmtD(weekRow.spend,0),s:'USD',c:''},
      {l:'Impressions',v:fmtK(weekRow.impressions),s:'Total',c:''},
      {l:'Clicks',v:metaClicks?metaClicks.toLocaleString():'\u2014',s:'Total',c:''},
      {l:'Avg. CPC',v:fmtD(metaCpc),s:'Per Click',c:'accent'},
      {l:'CTR',v:metaCtr?metaCtr.toFixed(2)+'%':'\u2014',s:'Click-Through Rate',c:'accent'}
    ];
    var googleKpis = [
      {l:'Spend',v:'\u2014',s:'Coming soon',c:''},
      {l:'Impressions',v:'\u2014',s:'Coming soon',c:''},
      {l:'Clicks',v:'\u2014',s:'Coming soon',c:''},
      {l:'Avg. CPC',v:'\u2014',s:'Coming soon',c:'accent'},
      {l:'CTR',v:'\u2014',s:'Coming soon',c:'accent'}
    ];

    function makeCards(kpis){
      return kpis.map(function(k){
        return '<div class="kpi-card '+k.c+'"><div class="kpi-label">'+k.l+'</div><div class="kpi-value">'+(k.v==='\u2014'?'<span style="color:var(--muted);font-size:1.2rem">\u2014</span>':k.v)+'</div><div class="kpi-sub">'+k.s+'</div></div>';
      }).join('');
    }

    grid.innerHTML =
      '<div class="platform-label"><span class="badge sales">META</span></div>'+
      '<div class="kpi-grid">'+makeCards(metaKpis)+'</div>'+
      '<div class="platform-label" style="margin-top:8px"><span class="badge sem">GOOGLE</span></div>'+
      '<div class="kpi-grid">'+makeCards(googleKpis)+'</div>';

  } else {
    note.style.display = 'none';
    var spend=sum(campaigns,'spend'), impr=sum(campaigns,'impressions');
    var clicks=sum(campaigns,'clicks'), msg=sum(campaigns,'messages');
    var cpc=clicks?spend/clicks:0, ctr=impr?clicks/impr*100:0;
    var kpis=[
      {l:'Total Spend',v:fmtD(spend,0),s:'USD',c:''},
      {l:'Impressions',v:fmtK(impr),s:'Total',c:''},
      {l:'Total Clicks',v:clicks?clicks.toLocaleString():'\u2014',s:'Total',c:''},
      {l:'Avg. CPC',v:fmtD(cpc),s:'Per Click',c:'accent'},
      {l:'CTR',v:ctr?ctr.toFixed(2)+'%':'\u2014',s:'Click-Through Rate',c:'accent'},
      {l:'Messages',v:msg.toLocaleString(),s:'WhatsApp Leads',c:''}
    ];
    grid.innerHTML = '<div class="kpi-grid">'+kpis.map(function(k){
      return '<div class="kpi-card '+k.c+'"><div class="kpi-label">'+k.l+'</div><div class="kpi-value">'+k.v+'</div><div class="kpi-sub">'+k.s+'</div></div>';
    }).join('')+'</div>';
  }
}

function renderMeta(data){
  var objs = [];
  for(var i=0;i<data.length;i++){ if(data[i].objective && objs.indexOf(data[i].objective)===-1) objs.push(data[i].objective); }
  var bmap = {SALES:'sales',WHATSAPP:'whatsapp',SIGNUP:'signup'};
  var html = '';
  if(!data.length){ html='<div class="empty">No META data for selected filters</div>'; }
  else {
    for(var oi=0;oi<objs.length;oi++){
      var obj = objs[oi];
      var rows = data.filter(function(d){ return d.objective===obj; });
      var tot = {impressions:0,reach:0,messages:0,clicks:0,spend:0,purchases:0,revenue:0};
      for(var ri=0;ri<rows.length;ri++){
        var r = rows[ri];
        for(var k in tot) tot[k] += r[k]||0;
      }
      var badge = bmap[obj.toUpperCase()] || 'sales';
      var isSales = obj.toUpperCase()==='SALES';
      var isWA = obj.toUpperCase()==='WHATSAPP';
      var isSignup = obj.toUpperCase()==='SIGNUP';

      html += '<div class="obj-section"><div class="obj-header"><span class="badge '+badge+'">'+obj+'</span><span style="color:var(--muted);font-size:.8rem">'+rows.length+' campaign'+(rows.length!==1?'s':'')+'</span></div>';
      html += '<div class="table-wrap"><table><thead><tr>';
      html += '<th>Campaign</th><th class="num">Impressions</th><th class="num">Reach</th>';
      if(isWA||isSignup) html += '<th class="num">Messages</th>';
      html += '<th class="num">Clicks</th><th class="num">CPC</th><th class="num">Spend (USD)</th>';
      if(isSales) html += '<th class="num">Purchases</th><th class="num">Revenue</th><th class="num">ROAS</th>';
      if(isSignup) html += '<th class="num">Leads</th>';
      html += '</tr></thead><tbody>';

      for(var ri2=0;ri2<rows.length;ri2++){
        var rr = rows[ri2];
        html += '<tr><td>'+rr.campaign+'</td>';
        html += '<td class="num">'+fmtK(rr.impressions)+'</td>';
        html += '<td class="num">'+(rr.reach?fmtK(rr.reach):'\u2014')+'</td>';
        if(isWA||isSignup) html += '<td class="num">'+(rr.messages||'\u2014')+'</td>';
        html += '<td class="num">'+(rr.clicks?rr.clicks.toLocaleString():'\u2014')+'</td>';
        html += '<td class="num">'+(rr.cpc?'$'+rr.cpc.toFixed(2):'\u2014')+'</td>';
        html += '<td class="num highlight">$'+rr.spend.toFixed(2)+'</td>';
        if(isSales) html += '<td class="num">'+(rr.purchases||'\u2014')+'</td><td class="num">'+(rr.revenue?fmtD(rr.revenue):'\u2014')+'</td><td class="num">'+(rr.roas?rr.roas.toFixed(2)+'x':'\u2014')+'</td>';
        if(isSignup) html += '<td class="num">'+(rr.leads||'\u2014')+'</td>';
        html += '</tr>';
      }

      html += '<tr class="total-row"><td>TOTAL</td>';
      html += '<td class="num">'+fmtK(tot.impressions)+'</td>';
      html += '<td class="num">'+fmtK(tot.reach)+'</td>';
      if(isWA||isSignup) html += '<td class="num">'+tot.messages.toLocaleString()+'</td>';
      html += '<td class="num">'+tot.clicks.toLocaleString()+'</td>';
      html += '<td class="num">'+(tot.clicks?'$'+(tot.spend/tot.clicks).toFixed(2):'\u2014')+'</td>';
      html += '<td class="num">$'+tot.spend.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+'</td>';
      if(isSales) html += '<td class="num">'+tot.purchases+'</td><td class="num">'+fmtD(tot.revenue)+'</td><td class="num">'+(tot.spend?(tot.revenue/tot.spend).toFixed(2)+'x':'\u2014')+'</td>';
      if(isSignup) html += '<td class="num">\u2014</td>';
      html += '</tr></tbody></table></div></div>';
    }
  }
  document.getElementById('metaPanel').innerHTML = html;
}

function renderGoogle(data){
  if(!data.length){ document.getElementById('googlePanel').innerHTML='<div class="empty">No Google data for selected filters</div>'; return; }
  var tot = {impressions:0,clicks:0,spend:0};
  for(var i=0;i<data.length;i++){ tot.impressions+=data[i].impressions; tot.clicks+=data[i].clicks; tot.spend+=data[i].spend; }
  var html = '<div class="table-wrap"><table><thead><tr><th>Type</th><th>Campaign</th><th class="num">Impressions</th><th class="num">Clicks</th><th class="num">CPC</th><th class="num">Spend (USD)</th></tr></thead><tbody>';
  for(var i=0;i<data.length;i++){
    var r = data[i];
    html += '<tr><td><span class="badge '+(r.objective.toLowerCase().indexOf('max')>-1?'pmax':'sem')+'">'+r.objective+'</span></td>';
    html += '<td>'+r.campaign+'</td><td class="num">'+fmtK(r.impressions)+'</td>';
    html += '<td class="num">'+(r.clicks?r.clicks.toLocaleString():'\u2014')+'</td>';
    html += '<td class="num">'+(r.cpc?'$'+r.cpc.toFixed(2):'\u2014')+'</td>';
    html += '<td class="num highlight">$'+r.spend.toFixed(2)+'</td></tr>';
  }
  html += '<tr class="total-row"><td colspan="2">TOTAL</td><td class="num">'+fmtK(tot.impressions)+'</td><td class="num">'+tot.clicks.toLocaleString()+'</td>';
  html += '<td class="num">'+(tot.clicks?'$'+(tot.spend/tot.clicks).toFixed(2):'\u2014')+'</td>';
  html += '<td class="num">$'+tot.spend.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+'</td></tr>';
  html += '</tbody></table></div>';
  document.getElementById('googlePanel').innerHTML = html;
}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById(tab+'Panel').classList.add('active');
}

document.getElementById('monthFilter').addEventListener('change', function(){ updateWeekFilter(); renderDashboard(); });
document.getElementById('weekFilter').addEventListener('change', function(){ renderDashboard(); });
document.getElementById('platformFilter').addEventListener('change', function(){
  var p = document.getElementById('platformFilter').value;
  var tabs = document.getElementById('platformTabs');
  if(p==='META'){
    tabs.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    tabs.querySelectorAll('.tab')[0].classList.add('active');
    document.querySelectorAll('.panel').forEach(function(x){ x.classList.remove('active'); });
    document.getElementById('metaPanel').classList.add('active');
  } else if(p==='Google'){
    tabs.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    tabs.querySelectorAll('.tab')[1].classList.add('active');
    document.querySelectorAll('.panel').forEach(function(x){ x.classList.remove('active'); });
    document.getElementById('googlePanel').classList.add('active');
  }
  renderDashboard();
});

document.getElementById('refreshBtn').addEventListener('click', function(){
  fetchSheetData(function(){
    setLatestMonth();
    updateWeekFilter();
    renderDashboard();
  });
});

// Init
loadWeeklyData(function(){
  mergePreloadedWeeks();
  fetchSheetData(function(){
    setLatestMonth();
    updateWeekFilter();
    renderDashboard();
  });
});
</script>
