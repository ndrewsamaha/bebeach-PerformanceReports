<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Performance Reports</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--white:#fff;--gold:#b8924a;--gold-light:#d4aa6a;--gold-pale:#fdf6ec;
  --navy:#1a2340;--text:#1a1a2e;--muted:#7a8499;--border:#e5e0d8;
  --teal:#2d7d8e;--green:#1a8a4a;--red:#c0392b;--blue:#2c5fad;
}
body{background:var(--bg);color:var(--text);font-family:Calibri,sans-serif;min-height:100vh}

/* LANDING */
#landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px}
.landing-header{text-align:center;margin-bottom:56px}
.landing-logo{font-size:1rem;font-weight:700;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.landing-title{font-size:2rem;font-weight:700;color:var(--navy)}
.client-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;width:100%;max-width:720px}
.client-card{background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;position:relative;overflow:hidden;transition:all .25s}
.client-card.clickable{cursor:pointer}
.client-card.clickable:hover{border-color:var(--gold);box-shadow:0 8px 32px rgba(184,146,74,.12);transform:translateY(-3px)}
.client-card.clickable::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--gold);opacity:0;transition:.25s}
.client-card.clickable:hover::before{opacity:1}
.client-card.dimmed{opacity:.65}
.logo-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto}
.logo-circle.bb{background:#f0ede5;border:2px solid var(--gold-light);animation:pulseGold 2.5s ease-in-out infinite}
.logo-circle.gi{background:#fdf5f0;border:2px solid #e8a87c;animation:pulseOrange 2.5s ease-in-out infinite}
@keyframes pulseGold{0%,100%{box-shadow:0 0 0 0 rgba(184,146,74,.4);transform:scale(1)}50%{box-shadow:0 0 0 12px rgba(184,146,74,0);transform:scale(1.04)}}
@keyframes pulseOrange{0%,100%{box-shadow:0 0 0 0 rgba(212,114,74,.4);transform:scale(1)}50%{box-shadow:0 0 0 12px rgba(212,114,74,0);transform:scale(1.04)}}
.coming-badge{display:inline-block;margin-top:18px;background:#f0f4f8;color:var(--muted);font-size:.72rem;font-weight:700;padding:4px 14px;border-radius:20px;letter-spacing:.08em;text-transform:uppercase}

/* DASHBOARD */
#dashboard{display:none}

/* HEADER */
header{background:var(--white);border-bottom:1px solid var(--border);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:70px;position:sticky;top:0;z-index:100}
.h-logo{font-size:1.3rem;font-weight:700;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;min-width:140px}
.h-logo span{color:var(--navy);font-weight:300}
.h-center{display:flex;align-items:center;gap:40px}
.h-right{display:flex;align-items:center;min-width:140px;justify-content:flex-end}

/* CUSTOM DROPDOWN */
.hdd{position:relative;display:inline-block}
.hdd-btn{background:transparent;border:none;color:var(--navy);padding:4px 0;font-size:.78rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;outline:none;font-family:Calibri,sans-serif;cursor:pointer;display:flex;align-items:center;gap:8px;transition:color .2s}
.hdd-btn:after{content:'';display:inline-block;width:6px;height:6px;border-right:1.5px solid currentColor;border-bottom:1.5px solid currentColor;transform:rotate(45deg) translateY(-2px);transition:transform .2s}
.hdd-btn.open:after{transform:rotate(-135deg) translateY(-2px)}
.hdd-btn:hover{color:var(--gold)}
.hdd-bar{position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--gold);transition:width .25s}
.hdd:hover .hdd-bar{width:100%}
.hdd-menu{display:none;position:absolute;top:calc(100% + 20px);left:50%;transform:translateX(-50%);background:var(--white);border:1px solid var(--border);min-width:180px;z-index:500;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.hdd-menu.show{display:block}
.hdd-item{padding:12px 24px;font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .15s;font-family:Calibri,sans-serif;white-space:nowrap;border-left:2px solid transparent}
.hdd-item:hover{color:var(--navy);background:var(--bg);border-left-color:var(--gold)}
.hdd-item.sel{color:var(--gold);border-left-color:var(--gold)}

/* BACK BUTTON */
.back-btn{background:transparent;border:1.5px solid var(--navy);color:var(--navy);padding:8px 20px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:Calibri,sans-serif;letter-spacing:.1em;text-transform:uppercase;transition:all .2s;position:relative;overflow:hidden}
.back-btn:before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:var(--navy);transition:left .2s;z-index:0}
.back-btn:hover:before{left:0}
.back-btn:hover{color:var(--white)}
.back-btn span{position:relative;z-index:1}

/* BOTTOM NAV */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--white);border-top:1px solid var(--border);box-shadow:0 -4px 20px rgba(0,0,0,.08);padding:10px 16px}
.bnav-row{display:flex;gap:8px;align-items:center}
.bnav-sel{flex:1;background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:10px;border-radius:10px;font-size:.85rem;outline:none;font-family:Calibri,sans-serif;cursor:pointer}
.bnav-sel:focus{border-color:var(--gold)}
.bnav-back{background:var(--navy);color:var(--white);border:none;padding:10px 16px;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:Calibri,sans-serif}

/* MAIN */
.main{padding:28px 32px;max-width:1400px;margin:0 auto}

/* TOGGLE */
.toggle-wrap{display:flex;flex-direction:column;gap:5px;margin-bottom:28px}
.toggle-wrap label{font-size:.68rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.toggle{display:flex;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:3px;width:fit-content}
.tog{padding:7px 28px;border-radius:8px;font-size:.82rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:var(--muted);font-family:Calibri,sans-serif;transition:.2s;user-select:none}
.tog:hover{color:var(--navy)}
.tog.on{background:var(--navy);color:var(--white)}

/* WEEK BAR */
.week-bar{background:var(--gold-pale);border:1.5px solid var(--gold-light);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.week-bar label{font-size:.72rem;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.week-bar select{background:var(--white);border:1.5px solid var(--gold-light);color:var(--text);padding:7px 14px;border-radius:8px;font-size:.88rem;outline:none;font-family:Calibri,sans-serif;cursor:pointer;min-width:200px}
.week-bar select:focus{border-color:var(--gold)}

/* SECTION TITLES */
.sec-title{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sec-title-txt{font-size:.72rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.sec-title-line{flex:1;height:1px;background:var(--border)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:24px}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:20px 18px;position:relative;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.04);transition:.2s}
.kpi-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
.kpi-card.acc{border-top:3px solid var(--gold)}
.kpi-card.teal{border-top:3px solid var(--teal)}
.kpi-lbl{font-size:.68rem;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.kpi-val{font-size:1.75rem;font-weight:700;color:var(--navy);line-height:1;margin-bottom:4px}
.kpi-val.gold{color:var(--gold)}
.kpi-sub{font-size:.72rem;color:var(--muted)}
.plat-sec{margin-bottom:28px}
.plat-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}

/* TABS */
.tab-bar{display:flex;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:4px;width:fit-content;box-shadow:0 1px 6px rgba(0,0,0,.04);margin-bottom:24px}
.tab{padding:9px 28px;cursor:pointer;font-size:.82rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-radius:9px;transition:.2s;font-family:Calibri,sans-serif}
.tab:hover{color:var(--navy);background:var(--bg)}
.tab.active{background:var(--navy);color:var(--white)}
.panel{display:none}.panel.active{display:block}

/* TABLES */
.obj-sec{background:var(--white);border:1px solid var(--border);border-radius:14px;margin-bottom:20px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.obj-hdr{padding:16px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--bg)}
.obj-count{font-size:.75rem;color:var(--muted)}
.badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.badge.sales{background:#e8f4f8;color:var(--teal)}
.badge.whatsapp{background:#e8f8ee;color:var(--green)}
.badge.signup{background:var(--gold-pale);color:var(--gold)}
.badge.pmax{background:#fdecea;color:var(--red)}
.badge.sem{background:#eaf0fb;color:var(--blue)}
.badge.clicks{background:#eaf0fb;color:var(--blue)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.88rem;font-family:Calibri,sans-serif}
thead{background:var(--bg)}
th{padding:11px 16px;text-align:left;font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:11px 16px;border-top:1px solid #f0ede8;color:var(--text);white-space:nowrap}
th:first-child,td:first-child{position:sticky;left:0;z-index:2;background:var(--white)}
th:first-child{background:var(--bg)}
tr:hover td{background:#fdfbf8}
tr:hover td:first-child{background:#fdfbf8}
.total-row td{background:var(--gold-pale);font-weight:700;color:var(--navy);border-top:2px solid var(--border)}
.total-row td:first-child{background:var(--gold-pale)}
.num{text-align:right}
.hi{color:var(--gold);font-weight:700}
.date-col{color:var(--muted);font-size:.82rem}
.empty{text-align:center;padding:48px;color:var(--muted);font-size:.9rem}

/* MOBILE */
@media(max-width:768px){
  .client-grid{grid-template-columns:1fr;max-width:340px}
  .landing-title{font-size:1.5rem}
  header{padding:0 16px}
  .h-logo{font-size:1rem;min-width:auto}
  .h-center{gap:16px}
  .hdd-btn{font-size:.72rem}
  .bottom-nav{display:none}
  header{height:auto;padding:12px 16px;flex-wrap:wrap;gap:8px}
  .main{padding:14px;padding-bottom:90px}
  .toggle{width:100%}
  .tog{flex:1;text-align:center;padding:10px 8px;font-size:.8rem}
  .week-bar{flex-direction:column;align-items:flex-start;gap:10px;padding:12px 14px}
  .week-bar select{width:100%;min-width:0}
  #weekTotalSpend{margin-left:0!important}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px}
  .kpi-val{font-size:1.3rem}
  .kpi-card{padding:14px 12px}
  .kpi-lbl{font-size:.65rem}
  .kpi-sub{font-size:.68rem}
  .tab-bar{width:100%}
  .tab{flex:1;text-align:center;padding:10px 8px;font-size:.78rem}
  th,td{padding:9px 10px;font-size:.8rem}
}
</style>
</head>

var isWeekly=false;
var curPlatform='all';
var curMonth='Mar_26';

function getFilters(){return{month:curMonth,platform:curPlatform};}

function filteredCampaigns(){
  return CAMPAIGNS.filter(function(d){
    return(curMonth==='all'||d.month===curMonth)&&(curPlatform==='all'||d.platform===curPlatform);
  });
}

function getSelectedWeek(){
  var label=document.getElementById('weekFilter').value;
  if(!label) return null;
  var pool=curMonth!=='all'&&WEEKS[curMonth]?WEEKS[curMonth]:Object.values(WEEKS).reduce(function(a,b){return a.concat(b);},[]);
  for(var i=0;i<pool.length;i++){if(pool[i].label===label)return pool[i];}
  return null;
}

function populateWeeks(){
  var sel=document.getElementById('weekFilter');
  sel.innerHTML='<option value="">— Choose a week —</option>';
  var pool=curMonth!=='all'&&WEEKS[curMonth]?WEEKS[curMonth]:Object.values(WEEKS).reduce(function(a,b){return a.concat(b);},[]);
  pool.forEach(function(w){var o=document.createElement('option');o.value=w.label;o.textContent=w.label;sel.appendChild(o);});
}

function updateWeekSpend(){
  var w=getSelectedWeek();
  var el=document.getElementById('weekTotalSpend');
  if(el) el.textContent=w?'Total Spend: AED '+fmtA(w.spend,0):'';
}

function setMonth(val,label){
  curMonth=val;
  document.getElementById('monthFilterM').value=val;
  var btn=document.getElementById('ddMBtn');
  btn.firstChild.nodeValue=label;
  document.getElementById('ddMMenu').querySelectorAll('.hdd-item').forEach(function(i){i.classList.toggle('sel',i.getAttribute('data-val')===val);});
  if(isWeekly) populateWeeks();
  renderDashboard();
}

function renderDashboard(){
  var campaigns=filteredCampaigns();
  var weekRow=isWeekly?getSelectedWeek():null;
  var fallback=null;
  if(!isWeekly&&curMonth!=='all'&&WEEKS[curMonth]&&WEEKS[curMonth].length&&!CAMPAIGNS.some(function(d){return d.month===curMonth;})){
    fallback={
      spend:WEEKS[curMonth].reduce(function(s,w){return s+w.spend;},0),
      impressions:WEEKS[curMonth].reduce(function(s,w){return s+w.impressions;},0),
      clicks:WEEKS[curMonth].reduce(function(s,w){return s+w.clicks;},0),
      messages:WEEKS[curMonth].reduce(function(s,w){return s+w.messages;},0)
    };
  }
  renderKPIs(campaigns,weekRow,fallback);
  updateWeekSpend();
  document.getElementById('breakdownSection').style.display=isWeekly?'none':'block';
  if(!isWeekly){
    renderMeta(campaigns.filter(function(d){return d.platform==='META';}));
    renderGoogle(campaigns.filter(function(d){return d.platform==='Google';}));
  }
}

function renderKPIs(campaigns,weekRow,fallback){
  var grid=document.getElementById('kpiGrid');
  if(weekRow){
    var mC=campaigns.filter(function(d){return d.platform==='META';});
    var mClk=weekRow.clicks||sum(mC,'clicks');
    var mCpc=mClk?weekRow.spend/mClk:0;
    var mCtr=weekRow.impressions?(mClk/weekRow.impressions*100):0;
    var gKpis=[{l:'Spend',v:'\u2014',s:'Coming soon',c:'acc'},{l:'Impressions',v:'\u2014',s:'Coming soon'},{l:'Clicks',v:'\u2014',s:'Coming soon'},{l:'Avg. CPC',v:'\u2014',s:'Coming soon',c:'teal'},{l:'CTR',v:'\u2014',s:'Coming soon',c:'teal'}];
    function cards(kpis){return'<div class="kpi-grid">'+kpis.map(function(k){return'<div class="kpi-card '+(k.c||'')+'"><div class="kpi-lbl">'+k.l+'</div><div class="kpi-val '+(k.gold?'gold':'')+'">'+k.v+'</div><div class="kpi-sub">'+k.s+'</div></div>';}).join('')+'</div>';}
    grid.innerHTML=
      '<div class="plat-sec"><div class="plat-hdr"><span class="badge sales">META</span></div>'+
      cards([{l:'Spend',v:fmtA(weekRow.spend,0),s:'AED',c:'acc',gold:true},{l:'Impressions',v:fmtK(weekRow.impressions),s:'Total'},{l:'Clicks',v:mClk?mClk.toLocaleString():'\u2014',s:'Total'},{l:'Avg. CPC',v:fmtC(mCpc),s:'AED',c:'teal'},{l:'CTR',v:mCtr?mCtr.toFixed(2)+'%':'\u2014',s:'Rate',c:'teal'},{l:'Messages',v:weekRow.messages?weekRow.messages.toLocaleString():'\u2014',s:'WhatsApp Leads'}])+'</div>'+
      '<div class="plat-sec"><div class="plat-hdr"><span class="badge sem">GOOGLE</span></div>'+cards(gKpis)+'</div>';
  } else {
    var sp=fallback?fallback.spend:sum(campaigns,'spend');
    var im=fallback?fallback.impressions:sum(campaigns,'impressions');
    var cl=fallback?fallback.clicks:sum(campaigns,'clicks');
    var ms=fallback?fallback.messages:sum(campaigns,'messages');
    var cp=cl?sp/cl:0;
    var ct=im?cl/im*100:0;
    var kpis=[{l:'Total Spend',v:fmtA(sp,0),s:'AED',c:'acc',gold:true},{l:'Impressions',v:fmtK(im),s:'Total'},{l:'Total Clicks',v:cl?cl.toLocaleString():'\u2014',s:'Total'},{l:'Avg. CPC',v:fmtC(cp),s:'AED',c:'teal'},{l:'CTR',v:ct?ct.toFixed(2)+'%':'\u2014',s:'Rate',c:'teal'},{l:'Messages',v:ms.toLocaleString(),s:'WhatsApp Leads'}];
    grid.innerHTML='<div class="kpi-grid">'+kpis.map(function(k){return'<div class="kpi-card '+(k.c||'')+'"><div class="kpi-lbl">'+k.l+'</div><div class="kpi-val '+(k.gold?'gold':'')+'">'+k.v+'</div><div class="kpi-sub">'+k.s+'</div></div>';}).join('')+'</div>';
  }
}

function renderMeta(data){
  var objs=[];
  for(var i=0;i<data.length;i++){if(data[i].objective&&objs.indexOf(data[i].objective)===-1)objs.push(data[i].objective);}
  var bmap={SALES:'sales',WHATSAPP:'whatsapp',SIGNUP:'signup'};
  var html='';
  if(!data.length){html='<div class="empty">No META data</div>';}
  else{
    for(var oi=0;oi<objs.length;oi++){
      var obj=objs[oi];
      var rows=data.filter(function(d){return d.objective===obj;});
      var tot={impressions:0,reach:0,messages:0,clicks:0,spend:0,purchases:0,leads:0,revenue:0};
      for(var ri=0;ri<rows.length;ri++){var r=rows[ri];for(var k in tot)tot[k]+=r[k]||0;}
      var badge=bmap[obj.toUpperCase()]||'sales';
      var iS=obj.toUpperCase()==='SALES';
      var iW=obj.toUpperCase()==='WHATSAPP';
      var iSu=obj.toUpperCase()==='SIGNUP';
      html+='<div class="obj-sec"><div class="obj-hdr"><span class="badge '+badge+'">'+obj+'</span><span class="obj-count">'+rows.length+' campaign'+(rows.length!==1?'s':'')+'</span></div>';
      html+='<div class="tbl-wrap"><table><thead><tr><th>Campaign</th><th>Date</th><th class="num">Impressions</th><th class="num">Reach</th>';
      if(iW||iSu)html+='<th class="num">Messages</th>';
      html+='<th class="num">Clicks</th><th class="num">CPC</th><th class="num">Spend</th>';
      if(iS)html+='<th class="num">Purchases</th><th class="num">Revenue</th><th class="num">ROAS</th>';
      if(iSu)html+='<th class="num">Leads</th>';
      html+='</tr></thead><tbody>';
      for(var ri2=0;ri2<rows.length;ri2++){
        var rr=rows[ri2];
        var sc=splitCamp(rr.campaign);
        html+='<tr><td>'+sc.name+'</td><td class="date-col">'+sc.date+'</td>';
        html+='<td class="num">'+fmtK(rr.impressions)+'</td><td class="num">'+(rr.reach?fmtK(rr.reach):'\u2014')+'</td>';
        if(iW||iSu)html+='<td class="num">'+(rr.messages||'\u2014')+'</td>';
        html+='<td class="num">'+(rr.clicks?rr.clicks.toLocaleString():'\u2014')+'</td>';
        html+='<td class="num">'+fmtC(rr.cpc)+'</td><td class="num hi">'+fmtA(rr.spend)+'</td>';
        if(iS)html+='<td class="num">'+(rr.purchases||'\u2014')+'</td><td class="num">'+(rr.revenue?fmtA(rr.revenue):'\u2014')+'</td><td class="num">'+(rr.roas?rr.roas.toFixed(2)+'x':'\u2014')+'</td>';
        if(iSu)html+='<td class="num">'+(rr.leads||'\u2014')+'</td>';
        html+='</tr>';
      }
      html+='<tr class="total-row"><td>TOTAL</td><td></td><td class="num">'+fmtK(tot.impressions)+'</td><td class="num">'+fmtK(tot.reach)+'</td>';
      if(iW||iSu)html+='<td class="num">'+tot.messages.toLocaleString()+'</td>';
      html+='<td class="num">'+tot.clicks.toLocaleString()+'</td>';
      html+='<td class="num">'+(tot.clicks?(tot.spend*USD/tot.clicks).toFixed(2):'\u2014')+'</td>';
      html+='<td class="num">'+fmtA(tot.spend)+'</td>';
      if(iS)html+='<td class="num">'+tot.purchases+'</td><td class="num">'+fmtA(tot.revenue)+'</td><td class="num">'+(tot.spend?(tot.revenue/tot.spend).toFixed(2)+'x':'\u2014')+'</td>';
      if(iSu)html+='<td class="num">'+tot.leads+'</td>';
      html+='</tr></tbody></table></div></div>';
    }
  }
  document.getElementById('metaPanel').innerHTML=html;
}

function renderGoogle(data){
  if(!data.length){document.getElementById('googlePanel').innerHTML='<div class="empty">No Google data</div>';return;}
  var tot={impressions:0,clicks:0,spend:0};
  for(var i=0;i<data.length;i++){tot.impressions+=data[i].impressions;tot.clicks+=data[i].clicks;tot.spend+=data[i].spend;}
  var html='<div class="obj-sec"><div class="tbl-wrap"><table><thead><tr><th>Type</th><th>Campaign</th><th class="num">Impressions</th><th class="num">Clicks</th><th class="num">CPC</th><th class="num">Spend</th></tr></thead><tbody>';
  for(var i=0;i<data.length;i++){
    var r=data[i];
    html+='<tr><td><span class="badge '+(r.objective.toLowerCase().indexOf('max')>-1?'pmax':'sem')+'">'+r.objective+'</span></td>';
    html+='<td>'+r.campaign+'</td><td class="num">'+fmtK(r.impressions)+'</td>';
    html+='<td class="num">'+(r.clicks?r.clicks.toLocaleString():'\u2014')+'</td>';
    html+='<td class="num">'+fmtC(r.cpc)+'</td><td class="num hi">'+fmtA(r.spend)+'</td></tr>';
  }
  html+='<tr class="total-row"><td colspan="2">TOTAL</td><td class="num">'+fmtK(tot.impressions)+'</td><td class="num">'+tot.clicks.toLocaleString()+'</td>';
  html+='<td class="num">'+(tot.clicks?(tot.spend*USD/tot.clicks).toFixed(2):'\u2014')+'</td>';
  html+='<td class="num">'+fmtA(tot.spend)+'</td></tr></tbody></table></div></div>';
  document.getElementById('googlePanel').innerHTML=html;
}

function switchPlatformTab(tab){
  document.getElementById('tabMeta').classList.toggle('active',tab==='meta');
  document.getElementById('tabGoogle').classList.toggle('active',tab==='google');
  document.getElementById('metaPanel').classList.toggle('active',tab==='meta');
  document.getElementById('googlePanel').classList.toggle('active',tab==='google');
}

window.addEventListener('DOMContentLoaded',function(){

  // Custom dropdown logic
  function initDD(btnId,menuId,onChange){
    var btn=document.getElementById(btnId);
    var menu=document.getElementById(menuId);
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var wasOpen=menu.classList.contains('show');
      document.querySelectorAll('.hdd-menu').forEach(function(m){m.classList.remove('show');});
      document.querySelectorAll('.hdd-btn').forEach(function(b){b.classList.remove('open');});
      if(!wasOpen){menu.classList.add('show');btn.classList.add('open');}
    });
    menu.querySelectorAll('.hdd-item').forEach(function(item){
      item.addEventListener('click',function(){
        var val=this.getAttribute('data-val');
        var label=this.textContent;
        btn.firstChild.nodeValue=label;
        menu.querySelectorAll('.hdd-item').forEach(function(i){i.classList.remove('sel');});
        this.classList.add('sel');
        menu.classList.remove('show');
        btn.classList.remove('open');
        onChange(val,label);
      });
    });
  }

  document.addEventListener('click',function(){
    document.querySelectorAll('.hdd-menu').forEach(function(m){m.classList.remove('show');});
    document.querySelectorAll('.hdd-btn').forEach(function(b){b.classList.remove('open');});
  });

  initDD('ddPBtn','ddPMenu',function(val,label){setPlatform(val,label);});
  initDD('ddMBtn','ddMMenu',function(val,label){setMonth(val,label);});

  // Landing
  document.getElementById('cardBB').addEventListener('click',function(){
    document.getElementById('landing').style.display='none';
    document.getElementById('dashboard').style.display='block';
    isWeekly=false;
    document.getElementById('togMonthly').classList.add('on');
    document.getElementById('togWeekly').classList.remove('on');
    document.getElementById('weekBar').style.display='none';
    setLatestMonth();
    renderDashboard();
    window.scrollTo(0,0);
  });

  document.getElementById('backBtn').addEventListener('click',function(){
    document.getElementById('dashboard').style.display='none';
    document.getElementById('landing').style.display='flex';
    window.scrollTo(0,0);
  });

  document.getElementById('backBtnM').addEventListener('click',function(){
    document.getElementById('dashboard').style.display='none';
    document.getElementById('landing').style.display='flex';
    window.scrollTo(0,0);
  });

  document.getElementById('togMonthly').addEventListener('click',function(){
    isWeekly=false;
    document.getElementById('togMonthly').classList.add('on');
    document.getElementById('togWeekly').classList.remove('on');
    document.getElementById('weekBar').style.display='none';
    renderDashboard();
  });

  document.getElementById('togWeekly').addEventListener('click',function(){
    isWeekly=true;
    document.getElementById('togWeekly').classList.add('on');
    document.getElementById('togMonthly').classList.remove('on');
    document.getElementById('weekBar').style.display='flex';
    populateWeeks();
    var sel=document.getElementById('weekFilter');
    if(sel.options.length>1) sel.selectedIndex=sel.options.length-1;
    renderDashboard();
  });

  document.getElementById('platformFilterM').addEventListener('change',function(){
    setPlatform(this.value,this.options[this.selectedIndex].text);
  });

  document.getElementById('monthFilterM').addEventListener('change',function(){
    setMonth(this.value,this.options[this.selectedIndex].text);
  });

  document.getElementById('weekFilter').addEventListener('change',function(){renderDashboard();});
  document.getElementById('tabMeta').addEventListener('click',function(){switchPlatformTab('meta');});
  document.getElementById('tabGoogle').addEventListener('click',function(){switchPlatformTab('google');});
});
</script>
</body>
</html>
